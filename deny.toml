[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Tauri 2.x 通过 tauri-utils -> urlpattern 间接引入，当前无上游可替换补丁版本。
    "RUSTSEC-2025-0080",
    # Tauri 2.x 通过 tauri-utils -> urlpattern 间接引入，当前无上游可替换补丁版本。
    "RUSTSEC-2025-0098",
    # GitHub Actions advisory DB 快照中同属 unic-ucd 维护状态告警，等待 Tauri 上游切换依赖。
    "RUSTSEC-2025-0100",
    # glib 为非 Windows target 的 GTK 传递依赖，Windows x64 Release 不会链接该依赖。
    "RUSTSEC-2024-0429",
    # rsa 当前无修复版本；本项目仅在本机 ACME 签名/CSR 场景使用，不提供远程可观测的 RSA 解密 oracle。
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
